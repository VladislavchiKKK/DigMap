<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>DigMap: Explorer Journal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container">
            <span class="navbar-brand">
                🌿 DigMap <span class="small text-muted" style="font-weight: normal;">| Journal</span>
            </span>
            
            <div id="navButtons" class="d-flex gap-3 align-items-center">
                <button class="btn btn-add-custom hidden px-4" id="btnAdd" onclick="openAddModal()">+ Додати запис</button>
                <button class="btn btn-link text-secondary text-decoration-none hidden" id="btnLogout" onclick="logout()">Вихід</button>
            </div>
        </div>
    </nav>

    <div style="height: 80px;"></div> 

    <div id="mainContent" class="hidden">
        <div class="container mt-5">
            
            <div class="glass-panel p-3 mb-5">
                <h4 class="mb-3 fw-bold text-dark">🗺️ Карта експедицій</h4>
                <div style="position: relative;">
                    <div id="map"></div>
                     <div id="mapTip" class="alert text-center fw-bold fixed-top m-3 hidden" 
                     style="z-index: 2000; top: 90px; width: fit-content; margin: 0 auto !important; left: 0; right: 0;">
                    📍 Вкажіть місце знахідки на карті
                </div>
                </div>
            </div>
            
            <div class="d-flex align-items-center mb-4 pb-2 border-bottom">
                <h3 class="fw-bold text-dark m-0">🗃️ Ваші знахідки</h3>
                <span class="badge bg-light text-dark ms-2 border">Реєстр</span>
            </div>
            
            <div id="list" class="row g-4"></div>
        </div>
    </div>

    <div id="authScreen" class="container" style="margin-top: 12vh;">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="glass-panel p-5">
                    <div class="text-center mb-5">
                        <h2 class="fw-bold" style="color: var(--primary-green);">DigMap</h2>
                        <p class="text-muted" id="authTitle">Вхід до системи</p>
                    </div>
                    
                    <form id="authForm" onsubmit="handleAuth(event)">
                        <div class="mb-4">
                            <label class="form-label small text-muted">EMAIL АДРЕСА</label>
                            <input type="email" class="form-control form-control-lg" id="email" required placeholder="name@email.com">
                        </div>
                        <div class="mb-4">
                            <label class="form-label small text-muted">ПАРОЛЬ</label>
                            <input type="password" class="form-control form-control-lg" id="password" required placeholder="••••••••">
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-3 fw-bold" id="btnSubmit">УВІЙТИ</button>
                    </form>

                    <div class="text-center mt-4">
                        <span id="authSwitchText" class="text-muted">Ще не з нами? </span>
                        <span id="authSwitchBtn" class="auth-switch" onclick="toggleAuthMode()">Зареєструватися</span>
                    </div>
                    <div id="authError" class="alert alert-danger mt-3 hidden border-0 bg-danger-subtle text-danger"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="addModal" tabindex="-1" data-bs-backdrop="blur">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold text-dark">Новий запис</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="addForm">
                        <div class="mb-4">
                            <label class="form-label small fw-bold text-muted">ТИП ЗНАХІДКИ</label>
                            <select class="form-select form-select-lg fw-bold" id="itemType" onchange="toggleFields()" style="color: var(--primary-green);">
                                <option value="coin">💰 Монета</option>
                                <option value="artifact">🏺 Артефакт</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small text-muted">НАЗВА</label>
                            <input type="text" class="form-control" id="inpName" placeholder="Коротку назву..." required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small text-muted">ОПИС</label>
                            <textarea class="form-control" id="inpDesc" rows="3" placeholder="Деталі знахідки..."></textarea>
                        </div>

                        <div id="coinFields" class="p-4 mb-4 rounded-4" style="background: #fffbeb; border: 2px solid var(--secondary-gold);">
                            <h6 class="fw-bold mb-3" style="color: var(--secondary-gold);">🔸 Параметри монети</h6>
                            <div class="row g-3 mb-3">
                                <div class="col-6"><input type="number" class="form-control" id="inpYear" placeholder="Рік"></div>
                                <div class="col-6"><input type="text" class="form-control" id="inpMetal" placeholder="Метал"></div>
                            </div>
                            <input type="text" class="form-control" id="inpDenom" placeholder="Номінал">
                        </div>

                        <div id="artifactFields" class="hidden p-4 mb-4 rounded-4" style="background: #f0fdf4; border: 2px solid var(--primary-green);">
                            <h6 class="fw-bold mb-3" style="color: var(--primary-green);">🔹 Параметри артефакту</h6>
                            <div class="mb-3"><input type="text" class="form-control" id="inpEra" placeholder="Епоха/Період"></div>
                            <div class="row g-3">
                                <div class="col-6"><input type="text" class="form-control" id="inpMaterial" placeholder="Матеріал"></div>
                                <div class="col-6"><input type="text" class="form-control" id="inpClass" placeholder="Клас/Тип"></div>
                            </div>
                        </div>

                        <div class="p-3 bg-light rounded-4 border">
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <label class="fw-bold text-muted mb-0">📍 Координати</label>
                                <div>
                                    <button class="btn btn-sm btn-outline-primary rounded-pill px-3 me-1" type="button" onclick="getGPS()">📡 GPS</button>
                                    <button class="btn btn-sm btn-outline-secondary rounded-pill px-3" type="button" onclick="chooseOnMap()">🗺️ На карті</button>
                                </div>
                            </div>
                            <div class="input-group">
                                <span class="input-group-text bg-white text-muted">Широта</span>
                                <input type="text" class="form-control bg-white fw-bold" id="inpLat" readonly>
                                <span class="input-group-text bg-white text-muted">Довгота</span>
                                <input type="text" class="form-control bg-white fw-bold" id="inpLng" readonly>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer bg-light border-0">
                    <button type="button" class="btn btn-primary w-100 fw-bold py-3 rounded-3" onclick="saveData()">ЗБЕРЕГТИ ЗАПИС</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script src="script.js"></script>
</body>
</html>
